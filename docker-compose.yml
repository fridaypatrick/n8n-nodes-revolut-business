services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - '5678:5678'
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: revolut-business-local-dev-key
      N8N_CUSTOM_EXTENSIONS: /home/node/custom
      N8N_INSTANCE_OWNER_MANAGED_BY_ENV: 'true'
      N8N_INSTANCE_OWNER_EMAIL: admin@example.com
      N8N_INSTANCE_OWNER_PASSWORD_HASH: '$$2a$$10$$9jV/fzgWvNaxtZeL5KcOG.Zx./wXXQj20kbM2rC.cMYDwfwK5jnn6'
      N8N_INSTANCE_OWNER_FIRST_NAME: Dev
      N8N_INSTANCE_OWNER_LAST_NAME: User
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_DIAGNOSTICS_CONFIG_FRONTEND: ''
      N8N_DIAGNOSTICS_CONFIG_BACKEND: ''
      N8N_VERSION_NOTIFICATIONS_ENABLED: 'false'
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./:/home/node/custom/n8n-nodes-revolut-business
    working_dir: /home/node/custom/n8n-nodes-revolut-business
    entrypoint:
      - sh
      - -c
    command:
      - npm install --include=dev && npm run build && n8n start
